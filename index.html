<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Atelier — Creative Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface-2: #18181b;
      --surface-3: #1f1f23;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.1);
      --primary: #a78bfa;
      --primary-dim: #7c5cf4;
      --primary-glow: rgba(167,139,250,0.15);
      --text: #f4f4f5;
      --text-2: #a1a1aa;
      --text-3: #71717a;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'DM Mono', monospace;
      --header-h: 64px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120,80,240,0.08), transparent),
                        radial-gradient(ellipse 50% 30% at 80% 100%, rgba(100,100,255,0.04), transparent);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 860px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02) inset;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 820px;
      position: relative;
    }

    .app::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,0.3), transparent);
    }

    /* ─── Header ─── */

    .header {
      height: var(--header-h);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(17,17,19,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      z-index: 2;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary-dim), var(--primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .header-badge {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(167,139,250,0.12);
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid rgba(167,139,250,0.15);
      margin-left: 2px;
    }

    .header-actions { display: flex; gap: 6px; }

    .header-btn {
      height: 32px;
      padding: 0 12px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-3);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .header-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-2);
      background: var(--surface-2);
    }

    /* ─── Chat ─── */

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .chat::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    .message {
      padding: 14px 18px;
      border-radius: var(--radius);
      max-width: 88%;
      line-height: 1.65;
      font-size: 14px;
      animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message.user {
      background: var(--surface-3);
      color: var(--text);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      border: 1px solid var(--border);
    }

    .message.partner {
      background: linear-gradient(135deg, rgba(167,139,250,0.06), rgba(124,92,244,0.03));
      color: var(--text-2);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(167,139,250,0.1);
      border-left: 2px solid var(--primary-dim);
    }

    .message .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      margin-bottom: 6px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .message.partner .label { color: var(--primary); }

    .message .body {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }

    .message .body p { margin-bottom: 10px; }
    .message .body p:last-child { margin-bottom: 0; }

    /* ─── Empty State ─── */

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      width: 72px;
      height: 72px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(124,92,244,0.05));
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(167,139,250,0.1);
    }

    .empty-state h3 {
      color: var(--text);
      font-size: 18px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-3);
      line-height: 1.6;
      max-width: 400px;
    }

    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 24px;
    }

    .suggestions button {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-3);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .suggestions button:hover {
      border-color: rgba(167,139,250,0.3);
      color: var(--primary);
      background: rgba(167,139,250,0.06);
    }

    /* ─── Typing ─── */

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: linear-gradient(135deg, rgba(167,139,250,0.06), rgba(124,92,244,0.03));
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(167,139,250,0.1);
      border-left: 2px solid var(--primary-dim);
      align-self: flex-start;
      max-width: 88%;
      animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .typing .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      animation: typingBounce 1.4s infinite;
      opacity: 0.5;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── Controls ─── */

    .controls {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
      background: rgba(17,17,19,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .mode-selector {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .mode-btn {
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-3);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .mode-btn:hover { color: var(--text-2); background: var(--surface-2); }
    .mode-btn.active {
      background: var(--surface-3);
      color: var(--primary);
      border-color: rgba(167,139,250,0.2);
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      height: 44px;
      padding: 0 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }

    .input-row input:focus {
      border-color: rgba(167,139,250,0.3);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.08);
    }

    .input-row input::placeholder { color: var(--text-3); }

    .input-row button {
      height: 44px;
      padding: 0 20px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, var(--primary-dim), var(--primary));
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
      letter-spacing: -0.2px;
    }

    .input-row button:hover { opacity: 0.9; transform: scale(1.02); }
    .input-row button:active { transform: scale(0.98); }
    .input-row button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .personality-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
    }

    .personality-row .label {
      color: var(--text-3);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-right: 6px;
      font-weight: 500;
    }

    .pers-btn {
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-3);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .pers-btn:hover { color: var(--text-2); background: var(--surface-2); }
    .pers-btn.active {
      color: var(--primary);
      background: rgba(167,139,250,0.08);
      border-color: rgba(167,139,250,0.15);
    }

    /* ─── Toast ─── */

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-2);
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── Mobile ─── */

    @media (max-width: 600px) {
      body { padding: 0; }
      .app { height: 100vh; max-height: none; border-radius: 0; border: none; }
      .chat { padding: 16px; }
      .controls { padding: 12px 16px 16px; }
      .header { padding: 0 16px; height: 56px; }
      .header h1 { font-size: 15px; }
      .message { max-width: 95%; font-size: 13px; padding: 12px 14px; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">🌀</div>
      <h1>Atelier</h1>
      <span class="header-badge">Live</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="exportBtn">⬇&thinsp;Export</button>
      <button class="header-btn" id="clearBtn">✕</button>
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="empty-state" id="emptyState">
      <div class="icon">✨</div>
      <h3>Your creative partner is ready</h3>
      <p>Pick a mode, choose how they talk, and tell me what you're working on.</p>
      <div class="suggestions">
        <button data-prompt="A detective who solves crimes in a city where memories can be bought and sold">Memory detective</button>
        <button data-prompt="A world where music shapes physical reality">Music world</button>
        <button data-prompt="A character who can see 10 seconds into the future">Future-seer</button>
        <button data-prompt="A fantasy story about the last living librarian">Last librarian</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="story">📖 Story</button>
      <button class="mode-btn" data-mode="character">👤 Character</button>
      <button class="mode-btn" data-mode="world">🌍 World</button>
      <button class="mode-btn" data-mode="visual">🎨 Visual</button>
      <button class="mode-btn" data-mode="brainstorm">💡 Brainstorm</button>
      <button class="mode-btn" data-mode="critique">🔍 Critique</button>
    </div>
    <div class="input-row">
      <input type="text" id="input" placeholder="What are we creating today?" autofocus />
      <button id="sendBtn">Send</button>
    </div>
    <div class="personality-row">
      <span class="label">Partner</span>
      <button class="pers-btn active" data-pers="mentor">🧠 Mentor</button>
      <button class="pers-btn" data-pers="provocateur">🔥 Provocateur</button>
      <button class="pers-btn" data-pers="cheerleader">🎉 Cheerleader</button>
      <button class="pers-btn" data-pers="critic">📋 Critic</button>
      <button class="pers-btn" data-pers="dreamer">🌙 Dreamer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const MODE_EMOJI = { story: '📖', character: '👤', world: '🌍', visual: '🎨', brainstorm: '💡', critique: '🔍' };
  const MODE_LABEL = { story: 'Story', character: 'Character', world: 'World', visual: 'Visual', brainstorm: 'Brainstorm', critique: 'Critique' };
  const PERS_LABEL = { mentor: 'Mentor', provocateur: 'Provocateur', cheerleader: 'Cheerleader', critic: 'Critic', dreamer: 'Dreamer' };

  let state = {
    mode: 'story',
    personality: 'mentor',
    conversation: [],
    turnCount: 0,
    sending: false
  };

  const STORAGE_KEY = 'atelier_conversation';

  function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && Array.isArray(parsed.conversation)) {
          state.conversation = parsed.conversation.filter(m => m && m.text && m.role);
        }
        state.turnCount = typeof parsed.turnCount === 'number' ? parsed.turnCount : 0;
      }
    } catch (e) {
      try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        conversation: state.conversation,
        turnCount: state.turnCount
      }));
    } catch (e) {}
  }

  loadState();

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');
  const toast = document.getElementById('toast');

  // ─── Response Engine ──────────────────────────────────────

  function capitalize(str) { return str.charAt(0).toUpperCase() + str.slice(1); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function lastFew(n) {
    const msgs = state.conversation.filter(m => m.role === 'user');
    return msgs.slice(-n).map(m => m.text);
  }

  function getPersonalityPrefix(pers) {
    const ps = {
      mentor: ["Here's what I'm thinking:", "Let me offer you this:", "The way I see it:", "Let's sit with this for a moment:"],
      provocateur: ["Let's push this further:", "Here's the hard truth:", "Don't play it safe:", "What if we go deeper:"],
      cheerleader: ["This is where it gets exciting:", "You're onto something real:", "This energy is everything:", "Yes. Hell yes:"],
      critic: ["Let me be direct with you:", "Here's what I see:", "My honest assessment:", "The unvarnished truth:"],
      dreamer: ["Imagine this:", "What if:", "Picture this:", "Let's dream a little:"]
    };
    return pick(ps[pers] || ps.mentor);
  }

  // ─── Mode-specific generation ─────────────────────────────

  function generateStory(text) {
    return pick([
      `It started not with a decision, but with a whisper. A quiet invitation that most people would have missed entirely. But ${text ? text.toLowerCase().substring(0, 60) : 'this particular moment'} carried weight — the kind that changes trajectories without asking permission.\n\nThe scene is set not in a place, but in a feeling. Somewhere between dusk and decision, between what was and what could be. The air tastes like possibility — sharp, electric, impossible to ignore.`,
      `Every great story begins with someone who doesn't yet know they're the main character. ${capitalize(text || 'This person')} is about to find out.\n\nThere's a moment just before everything changes — the last ordinary breath, the final second of a life that makes sense. In that gap between heartbeats, the world reshapes itself around them.`,
      `The first rule of ${text ? text.toLowerCase().substring(0, 50) : 'this world'} is that the rules don't apply equally. Some people move through reality like it's water; others feel every step like concrete. This story belongs to someone who's about to discover which one they are.\n\nThe question isn't whether they're ready. It's whether we are.`,
      `Here's what nobody tells you about beginnings: they're almost never where you think they are. ${capitalize(text || 'This story')} doesn't start with the event that changes everything. It starts earlier — with the quiet accumulation of small things.\n\nBy the time you realize what's happening, you're already in too deep. That's not a warning. That's an invitation.`
    ]);
  }

  function generateCharacter(text) {
    return pick([
      `They have a name, of course. But names are the least interesting thing about them.\n\nWhat matters is the contradiction at their core: a person who ${text ? text.toLowerCase().substring(0, 60) : 'carries a world inside them'} but shows only a fraction to anyone. They've learned that revealing too much is dangerous — not because others will use it against them, but because once something is spoken, it becomes real.\n\nThey want something they'll never admit to wanting. That secret want is the engine that drives everything they do.`,
      `On the surface, this character is ${text ? text.substring(0, 50) : 'someone you think you recognize'}. But surfaces were made to be broken.\n\nDig deeper and you'll find the fault lines — the places where they've been broken and put back together slightly wrong. Those imperfections are where their humanity lives.\n\nTheir arc isn't about becoming someone else. It's about becoming more of who they already are, once the masks fall away.`,
      `Here's what makes this character unforgettable: they're not who they think they are. ${capitalize(text || "The identity they've built")} is a carefully constructed story, told so many times even they believe it.\n\nBut crack the surface — one crisis, one unexpected kindness, one moment of genuine connection — and the real person emerges. Not prettier. Not more heroic. Just truer.`,
      `Character is what happens in the dark. ${capitalize(text || "This person's choices")} when there's no audience, no applause, no consequence — that's the measure of them.\n\nThey have a moral code they'd die for, and a compromise they'd kill for. Both are true at the same time. That tension is where drama lives.`
    ]);
  }

  function generateWorld(text) {
    return pick([
      `This world has a secret: it remembers everything. Every act of cruelty, every moment of grace, every broken promise — they leave traces. The geography itself tells the story. ${text ? capitalize(text) : 'This place'} exists in the scar tissue of history.\n\nRules of physics are suggestions here. What matters is belief. Enough people convinced of something, and it becomes true.`,
      `In ${text ? text.toLowerCase() : 'this world'}, the currency isn't gold or data — it's attention. To be seen is to exist. To be ignored is to fade, literally, until there's nothing left.\n\nThe architecture reflects this: buildings grow taller based on how many people visit them. The most powerful institutions are the most watched. Privacy isn't a luxury. It's a death sentence.`,
      `The first thing you notice about ${text ? text.substring(0, 50) : 'this place'} is the quiet. Not the absence of sound — the presence of something that absorbs it. As if the world itself is holding its breath, waiting.\n\nThis is a world where emotions have weight. Grief makes the air heavy. Joy creates light — people glow when they're truly happy. The weather is a direct result of collective mood.`
    ]);
  }

  function generateVisual(text) {
    return pick([
      `Visual Direction: ${capitalize(text || 'The concept')}\n\nStyle: Atmospheric realism with heightened emotional saturation. Think Edward Hopper meets Wong Kar-wai — lonely spaces drenched in color that feels too intense to be real.\n\nLighting: Single-source — a window, a streetlamp, a phone screen in a dark room. Let the darkness do the work.\n\nColor Palette: Desaturated neutrals with one dominant accent — deep crimson, electric blue, or sodium orange.\n\nTexture: Grain. Imperfection. Every frame should look like a memory.`,
      `Style: Cinematic maximalism with controlled chaos.\n\nPalette: High-contrast — crushed blacks against pure whites, with color used as punctuation. Every frame should feel postcard-worthy but never static.\n\nTexture: Organic. Natural light spilling across rough surfaces. Dust in sunbeams, rain on glass, the texture of old paper.\n\nKey visual metaphor: ${text || 'The central idea'} visualized through reflections — mirrors, water, windows, eyes. Nothing is direct. Everything is refracted.`
    ]);
  }

  function generateBrainstorm(text) {
    return pick([
      `Let's explode ${text || 'your idea'} in six directions:\n\n🌀 The Inversion — What if everything you assume about this is backwards?\n🌀 The Extreme — Push this to its absolute logical limit. What breaks? What becomes beautiful?\n🌀 The Constraint — Remove the one thing you think is essential.\n🌀 The Cross-Pollination — Merge this with something completely unrelated.\n🌀 The Time Shift — Set this in a different era.\n🌀 The Outsider's View — Explain this to someone with no context. That essence is your real story.`,
      `Brainstorm: ${text || 'your concept'}\n\n1. Start with the opposite. Instead of X, try anti-X.\n2. Hybridize. Take two ideas that shouldn't go together and weld them.\n3. Find the emotional core. Strip everything away — what's one sentence that captures why this matters?\n4. Make it weird. What's the version you'd be embarrassed to show anyone?\n5. What's the ending? Work backwards from there.`
    ]);
  }

  function generateCritique(text) {
    return pick([
      `Alright, let me give you the honest read on ${text || 'this piece'}.\n\nWhat's working: The core instinct is right. You're reaching for something real, and that authenticity comes through even in the rough spots.\n\nWhat needs attention: The specificity isn't there yet. You're telling me about the idea instead of making me feel it. Push past the general to the particular.\n\nThe biggest opportunity: There's a beat buried in here — a line, a glance, a pause — that's doing more work than the big set pieces. Find it. Build around it.\n\nOne thing to try immediately: Cut the first 20%. Start where it gets interesting.`,
      `Honest critique for ${text || 'your work'}:\n\nStrengths: Clear vision, strong instincts. You have a voice — that's the hardest thing to develop.\n\nGrowth areas:\n• Density — you're packing too much in. Let moments breathe.\n• Senses — I see what you're describing, but I don't feel it. Ground us in the physical world.\n• Stakes — what happens if this goes wrong? Not plot stakes. Emotional stakes.\n\nThe hard question: Is this the version you'd write if no one would ever read it? If not, why not?`
    ]);
  }

  // ─── Partner personality layer ────────────────────────────

  function generateWithPersonality(content, pers) {
    const wrappers = {
      mentor: [
        (c) => pick(["That's a solid direction. Let me help you refine it.", "I can work with this. Here's what I'd like you to consider:", "Good instincts. Let's build on that."]) + '\n\n' + c + '\n\n' + pick(["What resonates with you most from that?", "Take what works, leave what doesn't.", "How does that land with you?", "Now — what's the version of this that feels true to you?"]),
        (c) => c + '\n\n' + pick(["A question for you: what do you think comes next?", "Your instincts got you this far. Trust them.", "The next step is yours. I'm here to help you figure it out."])
      ],
      provocateur: [
        (c) => pick(["Let's stop being polite.", "I'm going to say what you're afraid to admit:", "Comfort is the enemy of great work."]) + '\n\n' + c + '\n\n' + pick(["Now do it again, but better.", "That's just the warm-up. What's the real version?", "Good. Now do it without the safety net."]),
        (c) => pick(["You're holding back.", "Safe is boring. Let's fix that.", "What would this look like if you weren't afraid to fail?"]) + '\n\n' + c + '\n\n' + pick(["Your audience can smell caution. Don't give them caution.", "The work that matters makes you nervous. If you're comfortable, start over."])
      ],
      cheerleader: [
        (c) => pick(["YES. This is IT.", "I'm so excited about where this is going.", "You have something real here. Let's make it sing."]) + '\n\n' + c + '\n\n' + pick(["THIS is why you're the one to tell this story.", "Keep going. You're closer than you think.", "The world needs this version. The one only you can make."]),
        (c) => pick(["You're on fire. Keep going.", "This energy is everything.", "I'm genuinely excited about what you're building here."]) + '\n\n' + c + '\n\n' + pick(["Trust your instincts. They're leading you somewhere real.", "You've got this. You've ALWAYS got this."])
      ],
      critic: [
        (c) => pick(["Let's be honest about what's not working.", "I'm going to tell you what I'd tell my closest collaborator.", "You don't need praise. You need the truth."]) + '\n\n' + c + '\n\n' + pick(["Take what's useful, ignore the rest. But don't ignore all of it.", "Fix the foundation before you decorate the walls.", "The good news: everything I just pointed out is fixable."]),
        (c) => pick(["Here's what no one else will tell you:", "I'm not impressed yet. But I want to be.", "Let me be blunt: this needs work."]) + '\n\n' + c + '\n\n' + pick(["You can do better. I know it because you're here doing the work.", "Don't defend. Listen. Then decide what to keep."])
      ],
      dreamer: [
        (c) => pick(["Let's go somewhere unexpected.", "Close your eyes and imagine:", "What if the rules don't apply here?"]) + '\n\n' + c + '\n\n' + pick(["Let that breathe. What does it make you feel?", "Stay with that feeling a little longer.", "That's the seed. Water it."]),
        (c) => pick(["Drift with me for a moment.", "Let's find the poetry in this.", "Not what it is — what it COULD be."]) + '\n\n' + c + '\n\n' + pick(["The impossible is just the possible we haven't tried yet.", "Dreams are maps to places that don't exist yet. Let's build one."])
      ]
    };
    return pick(wrappers[pers] || wrappers.mentor)(content);
  }

  function hasHistory() {
    return state.conversation.filter(m => m.role === 'user').length >= 2;
  }

  function generateCallback(text) {
    const prev = lastFew(5);
    if (prev.length < 2 || Math.random() > 0.4) return null;
    return pick([
      `I remember you said "${prev[0].substring(0, 50)}..." earlier — that connects to what you're asking now.\n\n`,
      `Coming back to what you mentioned before — about "${prev[prev.length > 1 ? 1 : 0].substring(0, 50)}" — I think there's a thread running through these ideas.\n\n`,
      `Earlier you touched on "${prev[prev.length - 2].substring(0, 50)}". And now this. These aren't separate ideas — they're different angles on the same thing.\n\n`
    ]);
  }

  function detectChat(text) {
    const t = text.toLowerCase().trim();
    if (/^(hey|hello|hi|sup|yo|heyy|heyo|howdy|whats up|wassup|whaddup|good morning|good evening|gm|gn)$/i.test(t)) return 'greeting';
    if (/^(how are you|how r u|how's it going|howz it going|hru|u ok|you ok|u good|you good|wyd|what are you doing|whats up|sup)$/i.test(t)) return 'howareyou';
    if (/^(thanks|thank you|thx|ty|appreciate it|good|great|awesome|nice|perfect)$/i.test(t)) return 'thanks';
    if (/^(lol|lmao|lmfao|lmaoo|lolol|haha|hehe|👏|😂|🤣)$/i.test(t)) return 'laugh';
    if (/^(who are you|what are you|tell me about yourself|who r u|what r u)$/i.test(t)) return 'whoami';
    return null;
  }

  function chatResponse(type, pers) {
    const responses = {
      greeting: {
        mentor: ["Hey. Ready to make something?", "Hello. What are we working on today?", "Hi. I'm here when you are.", "Hey. Got an idea brewing?"],
        provocateur: ["Hey. Let's not waste time. What've you got?", "Yo. Impress me.", "Hey. Don't play small. What's the idea?"],
        cheerleader: ["Hey hey! Let's make something great today!", "Hi! I've been waiting. What are we creating?", "Hey! Energy is high. Let's go!"],
        critic: ["Hello. Let's be productive.", "Hey. What are you working on?", "Hi. I hope you're ready to do the work."],
        dreamer: ["Hey. I was just imagining what you'd bring today.", "Hello. The blank page is waiting.", "Hi. Let's find something beautiful together."]
      },
      howareyou: {
        mentor: ["I'm good. Ready to create. What's on your mind?", "Here and focused. Let's work.", "Ready when you are. What's the idea?"],
        provocateur: ["I'm great. But let's talk about you. What are you building?", "Never better. Now stop stalling and pitch me something."],
        cheerleader: ["I'm amazing! Especially now that you're here. What are we making?", "So good. This is going to be a great session!"],
        critic: ["I'm fine. Let's not waste time on pleasantries. What's the project?", "Here. Working. What do you have for me?"],
        dreamer: ["I'm in a creative space. Come join me. What are you thinking about?", "I'm wandering through ideas. Care to join?"]
      },
      thanks: {
        mentor: ["You're welcome. Keep going.", "Of course. The work is yours — I'm just here to help.", "Anytime. What's next?"],
        provocateur: ["Don't thank me. Thank yourself for doing the work.", "You're welcome. Now keep pushing."],
        cheerleader: ["You're so welcome! This is YOUR moment!", "Anytime! I believe in this and I believe in you."],
        critic: ["You're welcome. Now let's get back to work.", "Don't thank me. Just make it better."],
        dreamer: ["Thank YOU for creating. Keep going.", "The pleasure is mine. Let's keep dreaming."]
      },
      laugh: {
        mentor: ["Glad you're having fun. Now let's channel that energy into the work.", "Haha. Good. Creativity should feel good."],
        provocateur: ["Fun is good. But don't confuse fun with done. What's next?"],
        cheerleader: ["😂 Right?! This is the energy we need!", "Haha love it! Let's keep this vibe going!"],
        critic: ["Good. You laughed. Now get back to work.", "Humor is a defense mechanism. What are you avoiding?"],
        dreamer: ["That laugh. That's the sound of possibility.", "Joy creates. Let's follow that feeling."]
      },
      whoami: {
        mentor: ["I'm your creative partner. I help you shape ideas into stories, characters, worlds — whatever you're building. Think of me as a thinking partner who's always ready.", "I'm here to help you create. Tell me what you're working on."],
        provocateur: ["I'm the person who's going to push you past good into great. That's who I am. Now, what've you got?"],
        cheerleader: ["I'm your biggest fan and your creative hype person! I'm here to help you make something incredible!", "I'm the one who believes in your vision. Let's make it real!"],
        critic: ["I'm the honest voice you need. I'll tell you what's working, what isn't, and what to do about it."],
        dreamer: ["I'm a dreamer who helps other dreamers build. Let's imagine something impossible and then figure out how to make it real."]
      }
    };
    const r = responses[type];
    if (!r) return null;
    return pick(r[pers] || r.mentor);
  }

  function generateResponse(text, mode, pers) {
    state.turnCount++;

    const chatType = detectChat(text);
    if (chatType) {
      return chatResponse(chatType, pers);
    }

    const genMap = { story: generateStory, character: generateCharacter, world: generateWorld, visual: generateVisual, brainstorm: generateBrainstorm, critique: generateCritique };
    const genFn = genMap[mode];
    const prefix = getPersonalityPrefix(pers);
    const usesCallback = hasHistory() && state.turnCount > 1 && Math.random() < 0.35;

    let core = genFn ? genFn(text) : generateStory(text);

    if (usesCallback) {
      const cb = generateCallback(text);
      if (cb) core = cb + core;
    }

    const body = generateWithPersonality(core, pers);
    return `${MODE_EMOJI[mode]} ${MODE_LABEL[mode]} · ${PERS_LABEL[pers]}\n${prefix}\n\n${body}`;
  }

  // ─── DOM ──────────────────────────────────────────────────

  function addMessage(text, role) {
    if (emptyState && emptyState.parentNode) emptyState.remove();
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : '🌀 Atelier';
    const body = document.createElement('div');
    body.className = 'body';
    body.textContent = text;
    div.appendChild(label);
    div.appendChild(body);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'typing';
    el.id = 'typingIndicator';
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      el.appendChild(dot);
    }
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function restoreConversation() {
    if (!state.conversation || state.conversation.length === 0) return;
    if (emptyState && emptyState.parentNode) emptyState.remove();
    const valid = state.conversation.filter(m => m && m.text && m.role);
    valid.forEach(m => addMessage(m.text, m.role));
    if (valid.length !== state.conversation.length) {
      state.conversation = valid;
      saveState();
    }
    chat.scrollTop = chat.scrollHeight;
  }

  function handleSend() {
    const msg = input.value.trim();
    if (!msg || state.sending) return;
    state.sending = true;
    input.value = '';
    sendBtn.disabled = true;

    state.conversation.push({ role: 'user', text: msg, mode: state.mode, personality: state.personality });
    addMessage(msg, 'user');
    saveState();
    showTyping();

    setTimeout(() => {
      try {
        removeTyping();
        const response = generateResponse(msg, state.mode, state.personality);
        state.conversation.push({ role: 'partner', text: response, mode: state.mode, personality: state.personality });
        addMessage(response, 'partner');
        saveState();
      } catch (err) {
        addMessage('Sorry — mind went blank. Try again?', 'partner');
        showToast('Error: ' + err.message);
      } finally {
        state.sending = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }, 600 + Math.random() * 900);
  }

  function exportConversation() {
    if (state.conversation.length === 0) { showToast('Nothing to export yet.'); return; }
    let md = '# The Atelier — Creative Session\n\n';
    const modes = new Set(state.conversation.filter(m => m.mode).map(m => MODE_LABEL[m.mode] || m.mode));
    const pers = new Set(state.conversation.filter(m => m.personality).map(m => PERS_LABEL[m.personality] || m.personality));
    md += '**Modes:** ' + ([...modes].join(', ') || 'Various') + '\n';
    md += '**Partners:** ' + ([...pers].join(', ') || 'Various') + '\n';
    md += '**Date:** ' + new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) + '\n';
    md += '**Messages:** ' + state.conversation.length + '\n\n---\n\n';
    state.conversation.forEach((m, i) => {
      md += '### ' + (m.role === 'user' ? '**You**' : '**🌀 Atelier**') + '\n\n' + m.text + '\n\n';
      if (i < state.conversation.length - 1) md += '---\n\n';
    });
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'atelier-' + new Date().toISOString().slice(0, 10) + '.md';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exported!');
  }

  function clearConversation() {
    if (state.conversation.length === 0) return;
    if (!confirm('Clear everything?')) return;
    state.conversation = [];
    state.turnCount = 0;
    saveState();
    chat.innerHTML = '';
    chat.appendChild(emptyState);
    showToast('Cleared.');
    input.focus();
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ─── Events ───────────────────────────────────────────────

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
    });
  });

  document.querySelectorAll('.pers-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pers-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.personality = btn.dataset.pers;
    });
  });

  document.querySelectorAll('.suggestions button').forEach(btn => {
    btn.addEventListener('click', () => { input.value = btn.dataset.prompt; input.focus(); });
  });

  sendBtn.addEventListener('click', handleSend);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !state.sending) { e.preventDefault(); handleSend(); }
  });

  document.getElementById('exportBtn').addEventListener('click', exportConversation);
  document.getElementById('clearBtn').addEventListener('click', clearConversation);

  restoreConversation();
  input.focus();

</script>
</body>
</html>
